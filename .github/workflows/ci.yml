name: Basic CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      # 🔥 Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 Build image
      - name: Build Docker image
        run: docker build -t patilreva/cicd-demo:latest .

      # 🔥 Push image
      - name: Push Docker image
        run: docker push patilreva/cicd-demo:latest

      script: |
  sudo docker pull patilreva/cicd-demo:latest

  # Stop & remove container by name (most important)
  sudo docker stop myapp || true
  sudo docker rm myapp || true

  # Also clean any container using port 5000 (extra safety)
  sudo docker ps -q --filter "publish=5000" | xargs -r sudo docker stop
  sudo docker ps -a -q --filter "publish=5000" | xargs -r sudo docker rm

  # Run new container
  sudo docker run -d -p 5000:5000 --name myapp patilreva/cicd-demo
